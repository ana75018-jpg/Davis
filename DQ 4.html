<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Davis Quartz - Commande</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#efe3cf;
margin:0;
}

header{
background:#5b3a29;
padding:25px;
text-align:center;
color:white;
}

.logo{
width:260px;
margin-top:10px;
}

.main{
max-width:900px;
margin:40px auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h2{
color:#5b3a29;
margin-top:0;
}

.section{
margin-top:30px;
}

select,input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#c79a5c;
border:none;
color:white;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#a77c44;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#5b3a29;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.deleteBtn{
background:#c94c4c;
padding:6px 12px;
border-radius:4px;
font-size:13px;
}

.deleteBtn:hover{
background:#a63b3b;
}

.total{
text-align:right;
font-size:22px;
margin-top:15px;
color:#5b3a29;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
color:#5b3a29;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

</style>

</head>

<body>

<header>
<h1>Davis Quartz</h1>
<img src="logo.png" class="logo">
</header>

<div class="main">

<h2>Commande de minerais</h2>

<div class="grid">

<div>

<label>Produit</label>
<select id="produit">
<option value="10">Charbon - 10$</option>
<option value="15">Fer - 15$</option>
<option value="14">Cuivre - 14$</option>
<option value="45">Or - 45$</option>
<option value="18">Seau - 18$</option>
<option value="20">Scie - 20$</option>
</select>

</div>

<div>

<label>Quantité</label>
<input type="number" id="quantite" value="1" min="1">

</div>

</div>

<button onclick="ajouterPanier()">Ajouter au panier</button>

<table id="panier">
<tr>
<th>Produit</th>
<th>Quantité</th>
<th>Prix</th>
<th>Action</th>
</tr>
</table>

<div class="total">
Total : <span id="total">0</span> $
</div>

<div class="section">

<h2>Informations client</h2>

<div class="grid">

<div>
<label>Nom</label>
<input type="text">
</div>

<div>
<label>Prénom</label>
<input type="text">
</div>

</div>

<label>Entreprise partenaire</label>
<select>
<option>GB Foundry</option>
<option>Millard's</option>
<option>Ferme Grapeseed</option>
<option>LTD Grove Street</option>
<option>LTD Sandy Shores</option>
<option>LTD Little Seoul</option>
<option>LTD Roxwood</option>
</select>

<label>Date de livraison</label>
<input type="date">

<label>Heure de livraison</label>
<input type="time">

<label>Commentaire</label>
<textarea rows="4"></textarea>

<button>Envoyer la commande</button>

</div>

</div>

<footer>
Davis Quartz © 2026
</footer>

<script>

let total = 0

function ajouterPanier(){

let produit = document.getElementById("produit")
let nomProduit = produit.options[produit.selectedIndex].text
let prix = parseFloat(produit.value)

let quantite = parseInt(document.getElementById("quantite").value)

let prixTotal = prix * quantite

let table = document.getElementById("panier")

let row = table.insertRow()

row.insertCell(0).innerHTML = nomProduit
row.insertCell(1).innerHTML = quantite
row.insertCell(2).innerHTML = prixTotal + " $"

let deleteCell = row.insertCell(3)
let btn = document.createElement("button")

btn.innerText = "Supprimer"
btn.className = "deleteBtn"

btn.onclick = function(){

total -= prixTotal
document.getElementById("total").innerText = total

table.deleteRow(row.rowIndex)

}

deleteCell.appendChild(btn)

total += prixTotal

document.getElementById("total").innerText = total

}

</script>

</body>
</html>
