<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Davis Quartz</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#5b3a29;
  --secondary:#c79a5c;
  --bg:#f5efe6;
  --white:#ffffffcc;
}

body{
  font-family:'Poppins', sans-serif;
  background:linear-gradient(120deg,#efe3cf,#f5efe6);
  margin:0;
}

header{
  background:linear-gradient(135deg,#5b3a29,#7a4d36);
  padding:30px;
  text-align:center;
  color:white;
}

.logo{
  width:200px;
}

.container{
  max-width:950px;
  margin:40px auto;
  background:var(--white);
  padding:30px;
  border-radius:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:15px;
}

.product{
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

.product.active{
  background:var(--secondary);
  color:white;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  background:var(--secondary);
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#notif{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#4caf50;
  color:white;
  padding:15px 25px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div id="notif">Commande envoyée ✅</div>

<header>
<h1>🏗️ Davis Quartz</h1>
<img src="logo.png" class="logo">
</header>

<div class="container">

<h2>🛒 Commande</h2>
<div class="products" id="products"></div>

<input type="number" id="quantite" value="1" min="1">
<button onclick="ajouterPanier()">Ajouter</button>

<table id="panier">
<tr><th>Produit</th><th>Qté</th><th>Prix</th></tr>
</table>

<div>Total : <span id="total">0</span>$</div>

<h2>👤 Informations client</h2>
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="telephone" placeholder="Téléphone">

<select id="partenaire">
<option>GB Foundry</option>
<option>Millard's</option>
<option>Ferme Grapeseed</option>
<option>LTD Grove Street</option>
<option>LTD Little Seoul</option>
<option>LTD Sandy Shores</option>
<option>LTD Roxwood</option>
</select>

<input type="date" id="date">
<input type="time" id="heure">

<textarea id="commentaire" placeholder="Commentaire"></textarea>

<button id="sendBtn" onclick="envoyerCommande()">📦 Envoyer</button>

</div>

<script>
let produits=[
{nom:"Charbon",prix:10},
{nom:"Fer",prix:15},
{nom:"Cuivre",prix:14},
{nom:"Or",prix:45},
{nom:"Scie",prix:20},
{nom:"Seau",prix:18}
]

let selected=null
let panier=[]

let container=document.getElementById("products")

produits.forEach((p,i)=>{
let div=document.createElement("div")
div.className="product"
div.innerHTML=`${p.nom}<br>${p.prix}$`

div.onclick=()=>{
selected=i
document.querySelectorAll('.product').forEach(el=>el.classList.remove('active'))
div.classList.add('active')
}

container.appendChild(div)
})

function ajouterPanier(){
if(selected===null)return

let p=produits[selected]
let q=parseInt(document.getElementById("quantite").value)
let prix=p.prix*q

panier.push({nom:p.nom,q,prix})

let row=document.getElementById("panier").insertRow()
row.innerHTML=`<td>${p.nom}</td><td>${q}</td><td>${prix}$</td>`

updateTotal()
}

function updateTotal(){
let total=panier.reduce((a,b)=>a+b.prix,0)
document.getElementById("total").innerText=total
}

function envoyerCommande(){

let nom=document.getElementById("nom").value
let prenom=document.getElementById("prenom").value
let tel=document.getElementById("telephone").value
let partenaire=document.getElementById("partenaire").value
let date=document.getElementById("date").value
let heure=document.getElementById("heure").value
let commentaire=document.getElementById("commentaire").value

let details=""
panier.forEach(i=>{
details+=`- ${i.nom} x${i.q} = ${i.prix}$\n`
})

fetch("https://discord.com/api/webhooks/1483605241546145792/LH573t2e9hi21OKEUwNhEwaflwNd_1fT44JfsaQiDT9E8vwi8GqBOQjzTL14w45_Yyql",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
embeds:[{
title:"📦 Nouvelle commande - Davis Quartz",
color:16753920,
fields:[
{
name:"👤 Client",
value: prenom+" "+nom,
inline:true
},
{
name:"📞 Téléphone",
value: tel || "Non renseigné",
inline:true
},
{
name:"🏢 Partenaire",
value: partenaire,
inline:false
},
{
name:"📅 Livraison",
value: date+" à "+heure,
inline:false
},
{
name:"🛒 Commande",
value: "```"+details+"```"
},
{
name:"💰 Total",
value: panier.reduce((a,b)=>a+b.prix,0)+"$",
inline:true
},
{
name:"📝 Commentaire",
value: commentaire || "Aucun",
inline:false
}
],
footer:{
text:"Davis Quartz • Système de commande"
},
timestamp:new Date().toISOString()
}]
})

let notif=document.getElementById("notif")
notif.style.display="block"
setTimeout(()=>notif.style.display="none",3000)
}

// support tablette
document.getElementById("sendBtn")
.addEventListener("touchstart", envoyerCommande)

</script>

</body>
</html>
