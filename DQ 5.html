<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Davis Quartz</title>

<style>

body{
font-family: Arial, sans-serif;
background:#efe3cf;
margin:0;
}

header{
background:#5b3a29;
padding:20px;
text-align:center;
color:white;
}

.logo{
width:260px;
margin-top:10px;
}

.container{
max-width:900px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
color:#5b3a29;
}

select,input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#c79a5c;
border:none;
color:white;
padding:12px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#a77c44;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#5b3a29;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.deleteBtn{
background:#c94c4c;
padding:6px 10px;
}

.total{
text-align:right;
font-size:20px;
margin-top:15px;
color:#5b3a29;
font-weight:bold;
}

.section{
margin-top:30px;
}

</style>

</head>

<body>

<header>
<h1>Davis Quartz</h1>
<img src="logo.png" class="logo">
</header>

<div class="container">

<h2>Commande</h2>

<label>Produit</label>
<select id="produit">
<option value="10">Charbon - 10$</option>
<option value="15">Fer - 15$</option>
<option value="14">Cuivre - 14$</option>
<option value="45">Or - 45$</option>
<option value="18">Seau - 18$</option>
<option value="20">Scie - 20$</option>
</select>

<label>Quantité</label>
<input type="number" id="quantite" value="1" min="1">

<button onclick="ajouterPanier()">Ajouter au panier</button>

<table id="panier">
<tr>
<th>Produit</th>
<th>Quantité</th>
<th>Prix</th>
<th>Action</th>
</tr>
</table>

<div class="total">
Total : <span id="total">0</span> $
</div>

<div class="section">

<h2>Informations client</h2>

<input placeholder="Nom">
<input placeholder="Prénom">

<select>
<option>GB Foundry</option>
<option>Millard's</option>
<option>Ferme Grapeseed</option>
<option>LTD Grove Street</option>
<option>LTD Sandy Shores</option>
<option>LTD Little Seoul</option>
<option>LTD Roxwood</option>
</select>

<label>Date de livraison</label>
<input type="date">

<label>Heure de livraison</label>
<input type="time">

<textarea placeholder="Commentaire"></textarea>

<button onclick="envoyerCommande()">Envoyer la commande</button>

</div>

</div>

<script>

let total = 0

function ajouterPanier(){

let produit = document.getElementById("produit")
let nomProduit = produit.options[produit.selectedIndex].text
let prix = parseFloat(produit.value)

let quantite = parseInt(document.getElementById("quantite").value)

let prixTotal = prix * quantite

let table = document.getElementById("panier")

let row = table.insertRow()

row.insertCell(0).innerHTML = nomProduit
row.insertCell(1).innerHTML = quantite
row.insertCell(2).innerHTML = prixTotal + " $"

let deleteCell = row.insertCell(3)
let btn = document.createElement("button")

btn.innerText = "Supprimer"
btn.className = "deleteBtn"

btn.onclick = function(){
total -= prixTotal
document.getElementById("total").innerText = total
table.deleteRow(row.rowIndex)
}

deleteCell.appendChild(btn)

total += prixTotal
document.getElementById("total").innerText = total

}

function envoyerCommande(){
alert("Commande envoyée (simulation)")
}

</script>

</body>
</html>
