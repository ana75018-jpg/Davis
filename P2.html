<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Panier - Davis Quartz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Davis Quartz</h1>
<img src="logo.png" class="logo">
</header>

<div class="container">

<h2>Panier</h2>

<table id="panier">
<tr>
<th>Produit</th>
<th>Quantité</th>
<th>Prix</th>
</tr>
</table>

<h3>Total : <span id="total">0</span>$</h3>

<h2>Informations client</h2>

<input placeholder="Nom">
<input placeholder="Prénom">

<select>
<option>GB Foundry</option>
<option>Millard's</option>
<option>Ferme Grapeseed</option>
<option>LTD Grove Street</option>
<option>LTD Sandy Shores</option>
<option>LTD Little Seoul</option>
<option>LTD Roxwood</option>
</select>

<label>Date livraison</label>
<input type="date">

<label>Heure livraison</label>
<input type="time">

<textarea placeholder="Commentaire"></textarea>

<br><br>

<button>Envoyer la commande</button>

</div>

<script src="script.js"></script>

</body>
</html>
